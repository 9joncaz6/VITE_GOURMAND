security:

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    firewalls:

        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            custom_authenticators:
                - App\Security\LoginFormAuthenticator

            logout:
                path: app_logout

    access_control:

        # EMPLOYÉ
        - { path: ^/employe, roles: ROLE_EMPLOYE }

        # ADMIN
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/menu/new, roles: ROLE_ADMIN }
        - { path: ^/menu/edit, roles: ROLE_ADMIN }
        - { path: ^/menu/delete, roles: ROLE_ADMIN }

        # UTILISATEUR CONNECTÉ
        - { path: ^/panier, roles: ROLE_USER }
        - { path: ^/commande, roles: ROLE_USER }
        - { path: ^/compte, roles: ROLE_USER }

        # PUBLIC
        - { path: ^/commander, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
