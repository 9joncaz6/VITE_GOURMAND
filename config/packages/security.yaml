security:

    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\Utilisateur
                property: email

    role_hierarchy:
        ROLE_ADMIN: [ROLE_EMPLOYE]
        ROLE_EMPLOYE: [ROLE_USER]

    firewalls:

        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        main:
            provider: app_user_provider

            # Empêche les comptes inactifs de se connecter
            user_checker: App\Security\UserChecker

            # Authenticator unique
            custom_authenticators:
                - App\Security\LoginFormAuthenticator

            # IMPORTANT : définir l’entry point
            entry_point: App\Security\LoginFormAuthenticator

            logout:
                path: app_logout
                invalidate_session: true

    access_control:

        - { path: ^/employe, roles: ROLE_EMPLOYE }

        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/menu/new, roles: ROLE_ADMIN }
        - { path: ^/menu/edit, roles: ROLE_ADMIN }
        - { path: ^/menu/delete, roles: ROLE_ADMIN }

        - { path: ^/panier, roles: ROLE_USER }
        - { path: ^/commande, roles: ROLE_USER }
        - { path: ^/compte, roles: ROLE_USER }

        - { path: ^/commander, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
